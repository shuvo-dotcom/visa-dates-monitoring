name: Scrape Processing Dates

on:
  schedule:
    # Every Tuesday at 09:00 UTC (INIS updates Tuesdays)
    - cron: "0 9 * * 2"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to git push the updated JSON

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: npm run scrape

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processing-dates.json
          if git diff --cached --quiet; then
            echo "No changes to commit — processing dates unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update processing dates [${TIMESTAMP}]"
            git push
            echo "Committed and pushed updated processing dates."
          fi
